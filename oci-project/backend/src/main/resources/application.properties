# ── Oracle DataSource ─────────────────────────────────────────────────────────
spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/XEPDB1
spring.datasource.username=OCI_USER
spring.datasource.password=CHANGE_ME
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ── Hibernate / JPA ───────────────────────────────────────────────────────────
# ddl-auto=none: schema is managed by DB/schema.sql, not Hibernate
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── HikariCP connection pool ──────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# ── JWT ──────────────────────────────────────────────────────────────────────
app.jwt.secret=Y2hhbmdlLXRoaXMtdG8tYS1sb25nLXNlY3VyZS1yYW5kb20tc2VjcmV0LWtleS1pbi1wcm9kdWN0aW9u
app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=86400000

# ── Server ───────────────────────────────────────────────────────────────────
server.servlet.context-path=/api/v1
